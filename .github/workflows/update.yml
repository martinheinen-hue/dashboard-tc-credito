name: Actualizar Dashboard

on:
  schedule:
    - cron: '0 10 * * *'   # todos los días a las 7 AM ARG (10 UTC)
  workflow_dispatch:         # también permite correrlo manualmente

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install google-cloud-bigquery pandas db-dtypes python-dateutil

      - name: Generar dashboard
        env:
          GCLOUD_REFRESH_TOKEN: ${{ secrets.GCLOUD_REFRESH_TOKEN }}
          GCLOUD_CLIENT_ID: ${{ secrets.GCLOUD_CLIENT_ID }}
          GCLOUD_CLIENT_SECRET: ${{ secrets.GCLOUD_CLIENT_SECRET }}
        run: python generate_dashboard.py

      - name: Commit y push index.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Dashboard actualizado $(date -u +'%Y-%m-%d')"
          git push
